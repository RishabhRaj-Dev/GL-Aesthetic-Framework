<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Farewell 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050505; }

        #Vanta-Canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-container {
            z-index: 10;
            pointer-events: none;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            padding: 20px;
        }

        #main-title {
            font-size: clamp(3rem, 10vw, 7rem); 
            font-weight: 800;
            letter-spacing: -3px;
            text-transform: uppercase;
            line-height: 0.9;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        #sub-title {
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            font-weight: 300;
            letter-spacing: 6px;
            opacity: 0.7;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="Vanta-Canvas">
    <div class="hero-container">
        <h1 id="main-title">Farewell 2026</h1>
        <p id="sub-title">The end of an era, the start of a journey.</p>
    </div>
</div>

<script src="libs/three.min.js"></script>
<script src="libs/vanta.birds.min.js"></script>

<script>
const states = [
    { speed: 4, size: 2, qty: 4, back: 0x000000, c1: 0x00f2ff, c2: 0x0062ff },
    { speed: 6, size: 2, qty: 5, back: 0x0b001a, c1: 0xff00cc, c2: 0xbc00ff },
    { speed: 8, size: 2, qty: 6, back: 0x1a0d00, c1: 0xffbb00, c2: 0xff4400 },
];

let current_index = 0;
let vanta_effect = null;

function the_vanta_effect(index_num) {
    try {
        if (vanta_effect) {
            vanta_effect.destroy();
            vanta_effect = null; // Explicitly nullify
            
            // FORCE CLEAN: Wipe the internal HTML of the container
            // This forces the browser to drop the old WebGL context 
            const container = document.getElementById("Vanta-Canvas");
            container.innerHTML = '<div class="hero-container"><h1 id="main-title">Farewell 2026</h1><p id="sub-title">The end of an era, the start of a journey.</p></div>';
        }

        const config = states[index_num];
        vanta_effect = VANTA.BIRDS({
            el: "#Vanta-Canvas",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            birdSize: config.size,
            speedLimit: config.speed,
            quantity: config.qty,
            backgroundColor: config.back,
            color1: config.c1,
            color2: config.c2,
        });
    } catch (e) {
        console.error("State transition error:", e);
    }
}

// Fixed Keydown Logic
window.addEventListener("keydown", (event) => {
    // In your original code, event.key === "" was likely causing issues. 
    // Use " " for Spacebar.
    if (event.key === " " || event.key === "ArrowRight") {
        current_index = (current_index + 1) % states.length;
        the_vanta_effect(current_index);
    }
});

// Initialize on load
the_vanta_effect(current_index);
</script>
</body>
</html>
