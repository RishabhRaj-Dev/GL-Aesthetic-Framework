<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Farewell 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
    width: 100%; 
    height: 100%; 
    margin: 0;
    display: flex; 
    background-color: #050505; 
}

/* Keep your existing * and body styles, update these: */
.wave {
    width: 10vw; 
    height: 100vh;
    position: relative; 
    /* This is the attribute that changes the color */
    background-color: #ffffff; 
    border-right: 1px solid rgba(0, 0, 0, 0.1); /* Changed border to dark for visibility */
    z-index: 20;
}

#Vanta-Canvas {
    flex: 1; 
    height: 100vh;
    position: relative;
}

.hero-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color:#ffffff
}

.left-container {
    position: absolute;
    top: 50%;
    left: 50%; /* Center it within the 10vw width */
    transform: translate(-50%, -50%) rotate(180deg); /* Centers and rotates */
    writing-mode: vertical-lr; 
    white-space: nowrap;
    pointer-events: none;
    color: #000000;
}

#main-title {
    font-size: clamp(2rem, 10vw, 7rem);
    font-weight: 800;
    letter-spacing: -3px;
    text-transform: uppercase;
    line-height: 0.9;
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
    margin: 0;
}

#sub-title {
    font-size: clamp(4rem, 1.5vw, 1.2rem); /* Slightly smaller to fit the sidebar */
    font-weight: 300;
    letter-spacing: 2px;
    opacity: 0.7;
    text-transform: uppercase;
    margin: 0;
}
    </style>
    <script src="libs/three.min.js"></script>
    <script src="libs/p5.min.js"></script>

<script src="libs/vanta.birds.min.js"></script>
<script src="libs/vanta.clouds.min.js"></script>
<script src="libs/vanta.clouds2.min.js"></script>
<script src="libs/vanta.dots.min.js"></script>
<script src="libs/vanta.globe.min.js"></script>
<script src="libs/vanta.halo.min.js"></script>
<script src="libs/vanta.net.min.js"></script>
<script src="libs/vanta.rings.min.js"></script>
<script src="libs/vanta.topology.min.js"></script>
<script src="libs/vanta.waves.min.js"></script>
</head>
<body>

<div class="wave">
    <div class="left-container">
        <h2 id="sub-title">Waves and Wishes</h2>
    </div>
</div>

<div id="Vanta-Canvas">
    <div class="hero-container">
        <h1 id="main-title">Farewell 2026</h1>
    </div>
</div>
<script>
let current_state = 0;
let the_vanta_effect = null;
let data = null; // Global variable
let transition_check=false;
const vantaStore = {
    "BIRDS":    { bg: "backgroundColor", palettes: [0x080808, 0x001219, 0x001122, 0x0a0a0a, 0x050505] },
    "FOG":      { bg: "highlightColor",  palettes: [0x1a1a1a, 0x242424, 0x0d1b2a, 0x1b263b, 0x0a0a0a] }, // Fog uses highlights
    "WAVES":    { bg: "backgroundColor", palettes: [0xb30000, 0x5588, 0x4d0000, 0x2b0000, 0x1a0000] }, // Bloody Red
    "CLOUDS":   { bg: "backgroundColor", palettes: [0x050505, 0x001122, 0x080808, 0x0a0a0a, 0x000000] },
    "CLOUDS2":  { bg: "backgroundColor", palettes: [0x050505, 0x0d1b2a, 0x1a1a1a, 0x080808, 0x000000] },
    "GLOBE":    { bg: "backgroundColor", palettes: [0x0a1128, 0x001219, 0x050505, 0x0d1b2a, 0x1a1a1a] }, // Speech Vibe
    "NET":      { bg: "backgroundColor", palettes: [0x050505, 0x080808, 0x001122, 0x0a0a0a, 0x000000] },
    "CELLS":    { bg: "color2",          palettes: [0x0a0a0a, 0x1a1a1a, 0x001219, 0x050505, 0x080808] }, // Cells uses color2
    "TRUNK":    { bg: "backgroundColor", palettes: [0x050505, 0x0a0a0a, 0x1a1a1a, 0x0d1b2a, 0x001219] },
    "TOPOLOGY": { bg: "backgroundColor", palettes: [0x050505, 0x0a0a0a, 0x080808, 0x000000, 0x111111] },
    "DOTS":     { bg: "backgroundColor", palettes: [0x050505, 0x0a0a0a, 0x080808, 0x000000, 0x111111] },
    "RINGS":    { bg: "backgroundColor", palettes: [0x050505, 0x0a0a0a, 0x080808, 0x001122, 0x1a1a1a] },
    "HALO":     { bg: "backgroundColor", palettes: [0x000000, 0x050505, 0x0a0a0a, 0x080808, 0x0d1b2a] }
};
async function get_states() {
    try {
        // Step 1: Get the response envelope
        const response = await fetch("states_presentation.json");
        // Step 2: Open the envelope and put it in our global variable
        data = await response.json();
        // Step 3: Now that the pantry is full, start the first slide
        the_state(); 
    } catch (e) {
        console.error(`Error reading the file: ${e}`);
    }
}
function the_state() {
    try {
        const effectName = data.effects[current_state];
        //if (effectName===data.effects[current_state-1]||(current_state===data.length && effectName===data.effects[0])){
        //const title = document.getElementById("main-title");
        //title.innerText = data.part[current_state];
        //const config = vantaStore[effectName];
        //const randomBg = config["palettes"][Math.floor(Math.random() * config.palettes.length)];
        //the_vanta_effect.setOptions({
          //  [config.bg]:randomBg
        //}
        
        //)
        //return;
        //};
        // 1. Clean up the old effect
        if (the_vanta_effect) {
            the_vanta_effect.destroy();
            the_vanta_effect = null;
        }
        const canvas = document.getElementById("Vanta-Canvas");
        canvas.style.background = "";
                const title = document.getElementById("main-title");
        const currentPartText = data.part[current_state]; // Get the text first
        title.innerText = currentPartText;

        // CORRECTED LOGIC:
        if (currentPartText === "Games") {
            console.log("Stopping Vanta for Games or Empty Effect");
            canvas.style.backgroundImage ="url('./gaming.png')" ; 
            canvas.style.backgroundRepeat = "no-repeat";
            canvas.style.backgroundSize = "cover";
             /* KEEPS IT CENTERED */
            return; // Now it will actually stop here
        }
        if (currentPartText === "Q/A(Round3)") {
            console.log("QNA");
            canvas.style.backgroundImage ="url('./qea.png')" ; 
            canvas.style.backgroundRepeat = "no-repeat";
            canvas.style.backgroundSize = "cover";
             /* KEEPS IT CENTERED */
            return; // Now it will actually stop here
        }
        if (currentPartText === "Talent Round(Round2)") {
            console.log("QNA");
            canvas.style.backgroundImage ="url('./t.png')" ; 
            canvas.style.backgroundRepeat = "no-repeat";
            canvas.style.backgroundSize = "cover";
             /* KEEPS IT CENTERED */
            return; // Now it will actually stop here
        }
        if (currentPartText === "Ramp Walk(Round1)") {
            console.log("QNA");
            canvas.style.backgroundImage ="url('./ramp.png')" ; 
            canvas.style.backgroundRepeat = "no-repeat";
            canvas.style.backgroundSize = "cover";
             /* KEEPS IT CENTERED */
            return; // Now it will actually stop here
        }
        if(transition_check===true){
        document.getElementById("main-title").innerText = "Waves And Wishes";
        const config = vantaStore["WAVES"];
        const randomBg = config.palettes[Math.floor(Math.random() * config.palettes.length)];
        the_vanta_effect= VANTA.WAVES({
            el:"#Vanta-Canvas",
            [config.bg]:randomBg
        })
        console.log(`transition state`);
        return;
        };

        // 2. Update the Title (Note the capital 'B' in Id)
       // 2. Update the Title

        // 3. Trigger the Vanta Effect
        // We get the string (e.g., "BIRDS") from our JSON
       the_vanta_effect = VANTA[effectName]({
            el: "#Vanta-Canvas",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            texturePath: (effectName==="Clouds2") ? null:"./gallery/blue_noise.png"
        });
        console.log(`The state number is: ${current_state}`);
    } catch (e) {
        console.error("Failed to load the state:", e);
    }
}
// Keydown Logic
window.addEventListener("keydown", (event) => {
    // Check if data exists yet (prevents crashing if user clicks too fast

    if (event.key === "ArrowRight") {
        // Use the length of the 'part' array to know when to loop
        transition_check=false
        current_state = (current_state + 1) % data.part.length;
        the_state(); // No need to pass current_state, it's global!
    }
});
window.addEventListener("keydown", (event)=>{//quantum rendering
    if(event.key===" "){
       transition_check=true;
       the_state()
    }
}
);
window.addEventListener("keydown", (event) => {
    // Check if data exists yet (prevents crashing if user clicks too fast

    if (event.key === "ArrowLeft") {
        // Use the length of the 'part' array to know when to loop
        transition_check=false
        current_state = (current_state-1);
        the_state(); // No need to pass current_state, it's global!
    }
});

// The "Power Button"
get_states();
</script>
</body>
</html>
